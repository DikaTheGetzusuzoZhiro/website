<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TatangOBF - WeAreDevs Style</title>
    <style>
        :root {
            --bg-url: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXZueXJueXJueXJueXJueXJueXJueXJueXJueXJueXJudSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxxS0uOumU8/giphy.gif');
            --accent-green: #00ff88;
            --panel-bg: rgba(10, 10, 10, 0.95);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-url) no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            width: 90%;
            max-width: 750px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #222;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            text-align: center;
        }

        h1 {
            color: var(--accent-green);
            font-size: 35px;
            margin: 0 0 20px 0;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--accent-green);
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #050505;
            border: 1px solid #333;
            border-radius: 5px;
            color: #00ff88;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
            resize: none;
            font-size: 12px;
        }

        .file-box {
            margin: 20px 0;
            padding: 15px;
            background: #111;
            border: 1px solid #222;
            border-radius: 5px;
        }

        .btn-enc {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-enc:hover {
            background: #00cc6e;
            box-shadow: 0 0 20px var(--accent-green);
        }

        .secondary-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-sec {
            flex: 1;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .discord-area {
            margin-top: 30px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        .dc-btn {
            text-decoration: none;
            color: #5865f2;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TATANG OBF</h1>
    
    <textarea id="inputCode" placeholder="Paste your Lua code here..."></textarea>

    <div class="file-box">
        <label style="font-size: 12px; color: #666; display: block; margin-bottom: 5px;">UPLOAD FILE LUA</label>
        <input type="file" id="fileInput" accept=".lua">
    </div>

    <button class="btn-enc" onclick="wearedevsEncrypt()">OBFUSCATE CODE</button>

    <textarea id="outputCode" style="margin-top: 20px; height: 150px;" placeholder="Result will appear here..." readonly></textarea>

    <div class="secondary-actions">
        <button class="btn-sec" onclick="copyCode()">COPY CODE</button>
        <button class="btn-sec" onclick="downloadFile()">DOWNLOAD .LUA</button>
    </div>

    <div class="discord-area">
        <a href="https://discord.gg/yourlink" class="dc-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" width="25" alt="DC">
            TATANG COMMUNITY DISCORD
        </a>
    </div>
</div>

<script>
    // Membaca file LUA
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('inputCode').value = e.target.result;
            reader.readAsText(file);
        }
    });

    function wearedevsEncrypt() {
        const code = document.getElementById('inputCode').value;
        if (!code.trim()) return alert("Masukkan kode dulu!");

        // Step 1: Ubah ke format Byte Array
        let bytes = [];
        for (let i = 0; i < code.length; i++) {
            bytes.push(code.charCodeAt(i));
        }

        // Step 2: Generate Junk Math (Simulasi WeAreDevs)
        // Kita bikin tabel angka besar yang sebenarnya adalah hasil kalkulasi matematika
        let encryptedTable = bytes.map(b => {
            let offset = Math.floor(Math.random() * 100000);
            return `[(${b + offset})-${offset}]`;
        }).join(',');

        // Step 3: Template Virtualization ala WeAreDevs
        const result = `--[[ v1.0.0 https://wearedevs.net/obfuscator ]]--
return (function(...)
    local _cache = {${encryptedTable}}
    local _vm = ""
    for _i=1, #_cache do
        _vm = _vm .. string.char(_cache[_i])
    end
    local _f, _err = loadstring(_vm)
    if _f then
        return _f(...)
    else
        error("TATANG_OBF: Decryption Failure -> " .. _err)
    end
end)(...)`;

        document.getElementById('outputCode').value = result;
    }

    function copyCode() {
        const out = document.getElementById('outputCode');
        out.select();
        document.execCommand('copy');
        alert("Berhasil disalin!");
    }

    function downloadFile() {
        const content = document.getElementById('outputCode').value;
        if (!content) return;
        const blob = new Blob([content], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "TatangObfuscated.lua";
        a.click();
    }
</script>

</body>
</html>
