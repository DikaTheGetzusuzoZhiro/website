<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TatangObf Lua Encryptor</title>
<link rel="stylesheet" href="/public/style.css">
</head>

<body>

<div class="box">

<h1>TatangObf</h1>
<p>Lua Obfuscator</p>

<textarea id="luaInput" placeholder="Paste Lua script here"></textarea>

<br>

<button onclick="encryptLua()">Encrypt</button>
<button onclick="downloadLua()">Download</button>

<h3>Result</h3>

<textarea id="result"></textarea>

</div>

<script>

async function encryptLua(){

const lua = document.getElementById("luaInput").value

const res = await fetch("/api/encrypt",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({lua})
})

const data = await res.json()

document.getElementById("result").value = data.result

}

function downloadLua(){

const text = document.getElementById("result").value

const blob = new Blob([text],{type:"text/plain"})

const url = URL.createObjectURL(blob)

const a = document.createElement("a")

a.href = url
a.download = "encrypted.lua"
a.click()

}

</script>

</body>
</html>
