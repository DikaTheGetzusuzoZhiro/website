<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATANG | THE LUA ARCHITECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6B00;
            --yellow: #FFD600;
            --black: #050505;
            --white: #ffffff;
            --glow: rgba(255, 107, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* BACKGROUND GACOR: HEXAGON & SCANLINES */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at center, transparent 0%, var(--black) 80%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            z-index: -2;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        /* MAIN TERMINAL CARD */
        .main-container {
            position: relative;
            width: 400px;
            padding: 50px 30px;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid var(--orange);
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(255, 107, 0, 0.1);
        }

        /* CORNER DECORATIONS */
        .main-container::before {
            content: ""; position: absolute; top: -10px; left: -10px;
            width: 40px; height: 40px; border-top: 4px solid var(--yellow); border-left: 4px solid var(--yellow);
        }
        .main-container::after {
            content: ""; position: absolute; bottom: -10px; right: -10px;
            width: 40px; height: 40px; border-bottom: 4px solid var(--yellow); border-right: 4px solid var(--yellow);
        }

        /* NAME & STATUS */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(to bottom, var(--white) 30%, var(--orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 10px var(--glow));
        }

        .role {
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--yellow);
            text-transform: uppercase;
            margin-bottom: 35px;
            font-weight: 700;
        }

        /* DEFINITION BOX */
        .info-box {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255, 107, 0, 0.05);
            padding: 20px;
            margin-bottom: 40px;
            position: relative;
        }

        .info-box p {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }

        .info-box b { color: var(--orange); }

        /* GACOR INTERACTIVE BUTTONS */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            position: relative;
            padding: 18px;
            background: transparent;
            border: 1px solid var(--orange);
            color: var(--white);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn:hover {
            background: var(--orange);
            color: var(--black);
            box-shadow: 0 0 30px var(--orange);
            transform: skewX(-5deg);
        }

        .btn img {
            width: 18px;
            transition: 0.3s;
        }

        .btn:hover img {
            filter: brightness(0);
        }

        /* DECORATIVE ELEMENTS */
        .status-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--orange), transparent);
            margin: 20px 0;
        }

        .glow-point {
            position: absolute;
            width: 200px; height: 200px;
            background: var(--orange);
            filter: blur(100px);
            opacity: 0.1;
            z-index: -1;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.2; transform: translate(-50%, -50%) scale(1.5); }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="scanlines"></div>
    <div class="glow-point"></div>

    <div class="main-container">
        <h1>TATANG</h1>
        <p class="role">LUA SPECIALIST</p>
        
        <div class="status-line"></div>

        <div class="info-box">
            <p>
                <b>Monetloader</b> adalah injector Lua tercepat dan paling stabil untuk <b>SAMP Mobile</b>. Memungkinkan integrasi script canggih untuk automasi dan modifikasi game tanpa hambatan.
            </p>
        </div>

        <div class="btn-list">
            <a href="https://discord.gg/G5SABE8uQe" class="btn">
                <img src="https://img.icons8.com/?size=100&id=30888&format=png&color=ffffff" alt="DC">
                DISCORD SERVER
            </a>
            <a href="https://youtube.com/@tatanglua" class="btn">
                <img src="https://img.icons8.com/?size=100&id=19318&format=png&color=ffffff" alt="YT">
                YOUTUBE CHANNEL
            </a>
            <a href="https://whatsapp.com/channel/0029Vb6F8TTDZ4LiVouR9H24" class="btn">
                <img src="https://img.icons8.com/?size=100&id=16713&format=png&color=ffffff" alt="WA">
                WHATSAPP ARCHIVE
            </a>
        </div>
    </div>

</body>
</html>
