<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TatangOBF - Pro Lua Encryption</title>
    <style>
        :root {
            /* BACKGROUND GIF/PNG */
            --bg-url: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXZueXJueXJueXJueXJueXJueXJueXJueXJueXJueXJudSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxxS0uOumU8/giphy.gif');
            --accent: #00ffcc;
            --dark-panel: rgba(15, 15, 15, 0.9);
        }

        body {
            margin: 0;
            font-family: 'Consolas', monospace;
            background: var(--bg-url) no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #eee;
        }

        .main-card {
            width: 95%;
            max-width: 650px;
            background: var(--dark-panel);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #00ffcc44;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        h1 {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            margin: 0 0 20px 0;
            font-size: 28px;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            border-radius: 10px;
            color: #00ffcc;
            padding: 12px;
            box-sizing: border-box;
            font-size: 13px;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        .file-section {
            margin: 15px 0;
            padding: 10px;
            border: 1px dashed #555;
            border-radius: 8px;
        }

        input[type="file"] { color: #888; cursor: pointer; }

        .btn-main {
            width: 100%;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 15px var(--accent);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-sub {
            flex: 1;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-sub:hover { background: #333; }

        .discord-footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .dc-link {
            text-decoration: none;
            color: #5865F2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .dc-link:hover { color: #fff; transform: scale(1.05); }

        .dc-icon {
            width: 30px;
            height: 30px;
            filter: drop-shadow(0 0 5px #5865F2);
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>TATANG OBF</h1>
    
    <textarea id="inputCode" placeholder="-- Paste Your Lua Code Here..."></textarea>

    <div class="file-section">
        <label style="display:block; margin-bottom: 5px; font-size: 12px; color: #888;">ATAU PILIH FILE:</label>
        <input type="file" id="fileInput" accept=".lua">
    </div>

    <button class="btn-main" onclick="processEncryption()">Encrypt Code (Hard)</button>

    <textarea id="outputCode" style="margin-top: 20px; height: 120px;" placeholder="Output result..." readonly></textarea>

    <div class="actions">
        <button class="btn-sub" onclick="copyResult()">COPY</button>
        <button class="btn-sub" onclick="downloadResult()">DOWNLOAD</button>
    </div>

    <div class="discord-footer">
        <a href="https://discord.gg/yourlink" class="dc-link">
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" class="dc-icon" alt="DC">
            JOIN TATANG COMMUNITY
        </a>
    </div>
</div>

<script>
    // Handle File Upload
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('inputCode').value = e.target.result;
            reader.readAsText(file);
        }
    });

    // Enkripsi Hard (Logic Injection)
    function processEncryption() {
        const code = document.getElementById('inputCode').value;
        if (!code.trim()) return alert("Mana kodenya?");

        // 1. Base64
        const stage1 = btoa(code);
        
        // 2. Junk Data & Byte Transformation (Membuat kode sangat panjang)
        let hexed = "";
        for (let i = 0; i < stage1.length; i++) {
            // Kita selipkan sampah karakter acak di antara byte asli
            const junk = Math.random().toString(36).substring(7);
            hexed += "\\" + stage1.charCodeAt(i) + "--" + junk + "\n";
        }

        // 3. Nested Wrapper (Template yang sangat rumit)
        const finalTemplate = `--[[ 
   TATANG OBFUSCATOR v2 
   Status: HIGH ENCRYPTION
   CREDITS: TATANG COMMUNITY
]]--
local _t = [[${hexed}]]
local function _proc(_s)
    local _r = ""
    for _v in _s:gmatch("\\\\(%d+)") do
        _r = _r .. string.char(tonumber(_v))
    end
    return _r
end
local _dec = function(_d)
    local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
    _d = string.gsub(_d, '[^'..b..'=]', '')
    return (_d:gsub('.', function(x)
        if (x == '=') then return '' end
        local r,f='',(b:find(x)-1)
        for i=6,1,-1 do r=r..(f%2^i-f%2^(i-1)>0 and '1' or '0') end
        return r;
    end):gsub('%d%d%d%d%d%d%d%d', function(x)
        return string.char(tonumber(x, 2))
    end))
end
local _exec = _dec(_proc(_t))
local _final = loadstring(_exec)
if _final then
    return _final()
else
    print("TATANG OBF: Critical Decryption Error")
end`;

        document.getElementById('outputCode').value = finalTemplate;
    }

    function copyResult() {
        const out = document.getElementById('outputCode');
        out.select();
        document.execCommand('copy');
        alert("Copied!");
    }

    function downloadResult() {
        const content = document.getElementById('outputCode').value;
        if (!content) return;
        const blob = new Blob([content], {type: "text/plain"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "Tatang_Encrypted.lua";
        a.click();
    }
</script>

</body>
</html>
