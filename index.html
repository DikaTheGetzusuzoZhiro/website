<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATANG LUA ARCHITECT | UNMATCHED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff88;
            --neon-dark: #008f4c;
            --bg-dark: #050505;
            --glass: rgba(0, 0, 0, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Background Anime & Scanlines */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.alphacoders.com/132/1325712.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* The Main Gacor Card */
        .cyber-card {
            width: 380px;
            padding: 40px 30px;
            background: var(--glass);
            border: 2px solid #1a1a1a;
            position: relative;
            text-align: center;
            backdrop-filter: blur(15px);
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Animated RGB Border Corner */
        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid var(--neon);
            clip-path: polygon(0 0, 20% 0, 0 20%);
            animation: pulse 2s infinite;
        }

        .cyber-card::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0; width: 100%; height: 100%;
            border: 2px solid var(--neon);
            clip-path: polygon(100% 100%, 80% 100%, 100% 80%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px var(--neon)); }
            50% { opacity: 0.3; }
        }

        /* Profile Section */
        .logo-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #1a1a1a;
            object-fit: cover;
            z-index: 5;
            position: relative;
        }

        .logo-ring {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dashed var(--neon);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon);
        }

        .status {
            font-size: 12px;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Gacor Buttons */
        .btn-container { display: flex; flex-direction: column; gap: 15px; }

        .cyber-btn {
            background: transparent;
            border: 1px solid var(--neon);
            color: #fff;
            padding: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.3s;
            overflow: hidden;
            text-transform: uppercase;
        }

        .cyber-btn:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 20px var(--neon);
            transform: skew(-5deg);
        }

        .cyber-btn:active {
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }

        .footer {
            margin-top: 30px;
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 5px;
        }

        /* Decorative HUD */
        .hud-corner {
            position: absolute;
            font-size: 8px;
            color: var(--neon);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="scanlines"></div>

    <div class="cyber-card">
        <div class="hud-corner" style="top: 10px; left: 15px;">SYS_LOAD: 99%</div>
        <div class="hud-corner" style="bottom: 10px; right: 15px;">LUA_VER: 5.1</div>

        <div class="logo-box">
            <div class="logo-ring"></div>
            <img src="https://i.ibb.co.com/zVPvVbM5/file-00000000b5d4720698886001d6221767.png" alt="Tatang">
        </div>

        <h1>TATANG</h1>
        <div class="status">▲ ACTIVE DEVELOPER ▲</div>

        <div class="btn-container">
            <a href="https://discord.gg/G5SABE8uQe" class="cyber-btn">Enter Discord</a>
            <a href="https://whatsapp.com/channel/0029Vb6F8TTDZ4LiVouR9H24" class="cyber-btn">WhatsApp Archive</a>
            <a href="https://youtube.com/@tatanglua" class="cyber-btn">Core Tutorials</a>
        </div>

        <div class="footer">
            SECURE ACCESS // EST 2025
        </div>
    </div>

</body>
</html>
