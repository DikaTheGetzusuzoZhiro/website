<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TatangOBF - Ultra Lua Encryption</title>
    <style>
        :root {
            /* BACKGROUND GIF/PNG - Ganti link di bawah untuk mengubah background */
            --bg-url: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXZueXJueXJueXJueXJueXJueXJueXJueXJueXJueXJudSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxxS0uOumU8/giphy.gif');
            --accent: #ff0055; /* Warna aksen baru yang lebih gahar */
            --primary-glow: #00ffd5;
            --dark-panel: rgba(10, 10, 10, 0.92);
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Font monospace agar lebih kerasa hacking */
            background: var(--bg-url) no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ddd;
        }

        .main-card {
            width: 95%;
            max-width: 700px;
            background: var(--dark-panel);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Efek garis pendar di pinggir */
        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

        h1 {
            color: var(--primary-glow);
            text-shadow: 0 0 15px var(--primary-glow);
            margin: 0 0 25px 0;
            font-size: 32px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            border-radius: 6px;
            color: #00ffcc;
            padding: 15px;
            box-sizing: border-box;
            font-size: 13px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
            font-family: inherit;
        }

        textarea:focus { border-color: var(--primary-glow); box-shadow: 0 0 10px rgba(0, 255, 213, 0.3); }

        .file-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px dashed #555;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
        }

        .file-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }

        input[type="file"] {
            color: #888;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(45deg, #111, #222);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 18px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-main:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 25px var(--accent);
            transform: translateY(-2px);
        }

        .btn-main:active { transform: translateY(1px); }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-sub {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-sub:hover { background: #252525; border-color: #555; }

        .discord-footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .dc-link {
            text-decoration: none;
            color: #5865F2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        .dc-link:hover { color: #fff; transform: scale(1.03); }

        .dc-icon {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 5px #5865F2);
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>TATANG OBF v3</h1>
    
    <textarea id="inputCode" placeholder="-- Paste Your Lua Code Here... atau Pilih File di Bawah"></textarea>

    <div class="file-section">
        <label class="file-label">ATAU UNGGAH FILE .LUA:</label>
        <input type="file" id="fileInput" accept=".lua">
    </div>

    <button class="btn-main" onclick="processUltraEncryption()">ENCRYPT (ULTRA HARD)</button>

    <textarea id="outputCode" style="margin-top: 25px; height: 150px;" placeholder="Output result..." readonly></textarea>

    <div class="actions">
        <button class="btn-sub" onclick="copyResult()">SALIN KODE</button>
        <button class="btn-sub" onclick="downloadResult()">UNDUH FILE</button>
    </div>

    <div class="discord-footer">
        <a href="https://discord.gg/yourlink" class="dc-link" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" class="dc-icon" alt="DC">
            GABUNG KOMUNITAS TATANG
        </a>
    </div>
</div>

<script>
    // Handle File Upload
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('inputCode').value = e.target.result;
                alert("File '" + file.name + "' berhasil dimuat!");
            }
            reader.readAsText(file);
        }
    });

    // Enkripsi Ultra Hard (Byte + XOR + Multilayer Loader)
    function processUltraEncryption() {
        const code = document.getElementById('inputCode').value;
        if (!code.trim()) return alert("Masukkan kode Lua kamu dulu, bro!");

        // Generasi Kunci XOR Acak
        const key = Math.floor(Math.random() * 254) + 1;
        
        // Step 1: Ubah kode jadi array byte dan lakukan XOR
        let encryptedBytes = [];
        for (let i = 0; i < code.length; i++) {
            encryptedBytes.push(code.charCodeAt(i) ^ key);
        }

        // Step 2: Gabungkan jadi string panjang format byte
        const byteString = encryptedBytes.join(',');

        // Step 3: Wrapper Lua Loader yang rumit dan panjang
        // Template ini didesain agar sulit dibaca tapi stabil dijalankan
        const finalTemplate = `--[[ 
   ::: TATANG OBFUSCATOR v3.0 (ULTRA-HARD) :::
   PROTECTION STATUS: MAXIMUM
   WARNING: DO NOT EDIT THIS CODE MANUALLY
]]--
local function _tatang_check() if _G._TATANG_V3 then return false end _G._TATANG_V3=true return true end
if not _tatang_check() then return end
local _k = ${key}
local _b = {${byteString}}
local _d = ""
local _s = string.char
local _t = tonumber
for _i=1, #_b do
    local _v = _b[_i]
    _d = _d .. _s(_v ~ _k)
end
local _f, _e = loadstring(_d)
if _f then
    local _status, _err = pcall(_f)
    if not _status then
        print("::: TATANG OBF Runtime Error :::")
        print(_err)
    end
else
    print("::: TATANG OBF Critical Decryption Error :::")
    print(_e)
end
_G._TATANG_V3 = nil -- Clean up`;

        document.getElementById('outputCode').value = finalTemplate;
        alert("Enkripsi Berhasil! Kode kamu sekarang pusing dibaca.");
    }

    function copyResult() {
        const out = document.getElementById('outputCode');
        if (!out.value) return;
        out.select();
        document.execCommand('copy');
        alert("Kode hasil enkripsi berhasil disalin ke clipboard!");
    }

    function downloadResult() {
        const content = document.getElementById('outputCode').value;
        if (!content) return alert("Belum ada kode untuk diunduh!");
        const blob = new Blob([content], {type: "text/plain"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "Tatang_Protected.lua";
        a.click();
        URL.revokeObjectURL(url); // Clean up memory
    }
</script>

</body>
</html>
