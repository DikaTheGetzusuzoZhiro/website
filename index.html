<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATANG | THE VOID ARCHITECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d50bb;
            --secondary: #6e48aa;
            --accent: #00d2ff;
            --gold: #ffd700;
            --bg: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: white;
        }

        /* Particles / Stars */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -2;
        }

        /* Circular Layout Container */
        .rpg-ui {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Rotating Magic Circle */
        .magic-circle {
            position: absolute;
            width: 320px;
            height: 320px;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            animation: spin 20s linear infinite;
            opacity: 0.3;
            box-shadow: 0 0 50px var(--secondary);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Center Profile Card */
        .center-card {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 50%;
            width: 220px;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(157, 80, 187, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold);
        }

        .level {
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Orbiting Buttons */
        .orbit-btn {
            position: absolute;
            width: 70px;
            height: 70px;
            background: var(--bg);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: 0.4s;
            z-index: 15;
            box-shadow: 0 0 15px var(--accent);
        }

        .orbit-btn img {
            width: 30px;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .orbit-btn span {
            position: absolute;
            bottom: -25px;
            font-size: 9px;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            opacity: 0;
            transition: 0.3s;
        }

        .orbit-btn:hover {
            transform: scale(1.2);
            background: var(--accent);
            box-shadow: 0 0 30px var(--accent);
        }

        .orbit-btn:hover span { opacity: 1; }

        /* Positioning the Buttons in Circle */
        .btn-yt { top: -10px; left: 50%; transform: translateX(-50%); border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .btn-dc { bottom: 40px; left: -10px; border-color: #5865F2; box-shadow: 0 0 15px #5865F2; }
        .btn-wa { bottom: 40px; right: -10px; border-color: #25D366; box-shadow: 0 0 15px #25D366; }

        /* RPG Resource Bars */
        .resource-bars {
            margin-top: 15px;
            width: 100px;
        }

        .bar {
            height: 4px;
            width: 100%;
            background: #222;
            margin-bottom: 5px;
            border-radius: 2px;
            overflow: hidden;
        }

        .hp { width: 90%; background: #ff4d4d; box-shadow: 0 0 5px #ff4d4d; }
        .mp { width: 100%; background: var(--accent); box-shadow: 0 0 5px var(--accent); }

        /* Info Text */
        .desc-tab {
            position: absolute;
            bottom: -100px;
            width: 300px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            line-height: 1.5;
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="rpg-ui">
        <div class="magic-circle"></div>

        <a href="https://youtube.com/@tatanglua" class="orbit-btn btn-yt" target="_blank">
            <img src="https://img.icons8.com/?size=100&id=19318&format=png&color=ffffff" alt="YT">
            <span>YOUTUBE</span>
        </a>

        <a href="https://discord.gg/G5SABE8uQe" class="orbit-btn btn-dc" target="_blank">
            <img src="https://img.icons8.com/?size=100&id=30888&format=png&color=ffffff" alt="DC">
            <span>DISCORD</span>
        </a>

        <a href="https://whatsapp.com/channel/0029Vb6F8TTDZ4LiVouR9H24" class="orbit-btn btn-wa" target="_blank">
            <img src="https://img.icons8.com/?size=100&id=16713&format=png&color=ffffff" alt="WA">
            <span>WHATSAPP</span>
        </a>

        <div class="center-card">
            <h1>TATANG</h1>
            <div class="level">LVL. 99 LUA MAGE</div>
            
            <div class="resource-bars">
                <div class="bar"><div class="hp"></div></div>
                <div class="bar"><div class="mp"></div></div>
            </div>
        </div>

        <div class="desc-tab">
            <b>Monetloader</b>: Senior-class injector for SAMP Mobile. 
            Optimized for performance and stability.
        </div>
    </div>

</body>
</html>
